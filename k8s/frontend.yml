apiVersion: apps/v1
kind: Deployment
metadata:
  name: zuriapp-frontend
  labels:
    app: zuriapp-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: zuriapp-frontend
  template:
    metadata:
      labels:
        app: zuriapp-frontend
    spec:
      containers:
      - name: frontend
        image: DOCKERHUB_USERNAME/zuriapp-frontend:latest
        ports:
        - containerPort: 80
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: zuriapp-frontend-service
spec:
  type: LoadBalancer # Exposes the app to a Public IP via k3s Klipper LoadBalancer
  selector:
    app: zuriapp-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000

apiVersion: v1
kind: Service
metadata:
  name: zuriapp-service
spec:
  selector:
    app: nodejs-app
  ports:
    - protocol: TCP
      port: 80         # Port exposed outside the cluster
      targetPort: 3000 # Port your Node.js app listens on
  type: ClusterIP      # Use NodePort or LoadBalancer if exposing directly without an Ingress
